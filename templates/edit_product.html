{% extends "base.html" %}
{% block title %}Edit Product | ZMart{% endblock %}
{% block content %}
<section class="section narrow-section">
    <form method="post" class="glass-card form-card">
        <h2>Edit Product</h2>

        {% if db_error %}
            <div class="info-card warning-card">
                <strong>Could not load product.</strong>
                <p>{{ db_error }}</p>
            </div>
        {% endif %}

        {% if product %}
            <label>Name</label>
            <input type="text" name="name" value="{{ product.name }}" required>

            <label>Category</label>
            <select name="category" required>
                {% for category in categories %}
                    <option value="{{ category.category_id }}" {% if category.category_id == product.category_id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>

            <label>Price</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}" required>

            <label>Stock</label>
            <input type="number" name="stock" value="{{ product.stock_quantity }}" required>

            <label>Image URL</label>
            <input type="text" name="image_url" value="{{ product.image_url or '' }}">

            <label>Description</label>
            <textarea name="description" rows="4">{{ product.description or '' }}</textarea>

            <button type="submit" class="btn btn-primary">Update Product</button>
        {% endif %}
    </form>
</section>
{% endblock %}
