{% extends "base.html" %}
{% block title %}Login | ZMart{% endblock %}
{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <span class="eyebrow">Welcome Back</span>
        <h1>Login to continue your shopping.</h1>
        <p>Access your cart, favourites, orders, and daily grocery picks from one place.</p>
    </div>
    <form method="post" class="auth-form glass-card">
        <h2>Login</h2>
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        <button type="submit" class="btn btn-primary">Login</button>
        <p class="auth-switch-text">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </form>
</section>
{% endblock %}
